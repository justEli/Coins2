# Different coin variants can be configured in this config. These coins are the basis for
#  all kind of aspects. One place to use these defined coins is in drops.yml.

# Default settings for a coin when the value has not been set. These describe the
#  characteristics of the coin as an item stack.
default:
  item:
    type: 'material' # or 'player_head'
    value: 'minecraft:gold_nugget' # texture when 'player_head'
  name:
    singular: '<#F9CE64>Coin'
    plural: '<#F9CE64>Coins'
  currency: 'vault_balance' # from currencies.yml
  immutable: true # keep the coin unchanged (no anvil/craft modification)
  meta:
    enchanted: false
    glow-color: 'none' # named text color, i.e. green, light_purple
    hologram: false
    model-strings: ['coin'] # adds "minecraft:custom_model_data": {strings: ["coin"]}
    lore: [] # avoid italic with <italic:false>
  behavior:
    item-merge: false # coins to merge when on the ground (of same value only)
    hopper-pickup: false
  deposit:
    sound: 'minecraft:item.armor.equip_gold'
    volume: 0.50
    pitch: 0.30

# defining different coins, and override default values, mostly used for 'item' and 'name'
coins:
  'enchanted_gold_coin':
    item: 'minecraft:gold_nugget'
    name:
      singular: '<#F9CE64>Coin of Gold'
      plural: '<#F9CE64>Coins of Gold'
    meta:
      enchanted: true

  'gold_coin':
    item: 'minecraft:gold_nugget'
    name:
      singular: '<#F9CE64>Coin of Gold'
      plural: '<#F9CE64>Coins of Gold'

  'silver_coin':
    item: 'minecraft:iron_nugget'
    name:
      singular: '<#D2D2D2>Coin of Silver'
      plural: '<#D2D2D2>Coins of Silver'

  'bronze_coin':
    item: 'minecraft:copper_nugget'
    name:
      singular: '<#E68D3F>Coin of Bronze'
      plural: '<#E68D3F>Coins of Bronze'
    behavior:
      item-merge: true

  'sun_coin':
    item: 'minecraft:sunflower'
    name:
      singular: '<#FFAA00>Coin of the Sun'
      plural: '<#FFAA00>Coins of the Sun'
    meta:
      enchanted: true
      glow-color: 'gold'
    deposit:
      sound: 'minecraft:entity.experience_orb.pickup'

  'bag_of_coins':
    item:
      type: 'player_head'
      value: '95fd67d56ffc53fb360a17879d9b5338d7332d8f129491a5e17e8d6e8aea6c3a'
    name:
      singular: '<#FFFF55>Bag of Coins'
      plural: '<#FFFF55>Bags of Coins'
    meta:
      hologram: true
    deposit:
      sound: 'minecraft:item.armor.equip_copper'
